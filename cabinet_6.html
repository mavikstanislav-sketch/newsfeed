<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e1621">
<title>NewsFeed</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1621;--s1:#17212b;--s2:#1c2b3a;--s3:#243447;--s4:#2b5278;
  --blue:#3d9ae8;--blue2:#6ab4f0;
  --text:#e8f1f8;--t2:#a8c0d0;--t3:#6b8a9e;--t4:#3d5568;
  --green:#4dcd5e;--red:#e05555;--orange:#ff8c42;--pink:#ff6b9d;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --sans:'Inter',system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-top:var(--safe-top)}

/* TOPBAR */
.topbar{height:50px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;position:sticky;top:0;z-index:10}
.topbar-icon{width:32px;height:32px;border-radius:9px;background:var(--s4);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.topbar-info{flex:1}
.topbar-title{font-size:15px;font-weight:600}
.topbar-sub{font-size:11px;color:var(--t3)}
.icon-btn{width:34px;height:34px;border-radius:9px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.icon-btn:hover{background:var(--s2)}
.icon-btn svg{width:17px;height:17px;stroke:var(--t2);fill:none;stroke-width:1.8}

/* PAGES */
.page{display:none;height:calc(100vh - 50px - var(--nav-h) - var(--safe-top) - var(--safe-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fadeUp .18s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;z-index:10;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:color .15s;position:relative}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;transition:stroke .15s}
.nav-btn span{font-size:10px;font-weight:500}
.nav-badge{position:absolute;top:2px;right:calc(50% - 18px);min-width:16px;height:16px;border-radius:8px;background:var(--blue);font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* FILTER */
.filter-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;gap:5px;overflow-x:auto;position:sticky;top:0;z-index:4}
.filter-bar::-webkit-scrollbar{display:none}
.chip{padding:4px 12px;border-radius:18px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--t2);white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* NEWS */
.msg-wrap{padding-bottom:8px}
.msg-date{text-align:center;margin:10px 0 6px}
.msg-date span{background:var(--s2);color:var(--t2);font-size:11px;padding:3px 12px;border-radius:12px;border:1px solid var(--border)}
.news-msg{display:block}
.msg-bubble{width:100%;background:var(--s1);padding:12px 14px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;transition:background .12s}
.msg-bubble:active{background:var(--s2)}
.msg-bubble::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ch-color,var(--blue))}

.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ch-avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-channel{font-size:12.5px;font-weight:700;flex:1}
.msg-time-top{font-size:11px;color:var(--t4)}

.msg-title{font-size:14.5px;font-weight:700;line-height:1.4;color:var(--text);margin-bottom:6px;word-break:break-word}
.msg-body{font-size:13px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.msg-body.exp{-webkit-line-clamp:unset}
.expand-btn{font-size:11.5px;color:var(--blue);cursor:pointer;background:none;border:none;font-family:var(--sans);padding:4px 0 0;display:inline-block}

.msg-media{margin:8px 0;border-radius:10px;overflow:hidden}
.msg-media img{width:100%;max-height:220px;object-fit:cover;display:block}

.msg-ai{margin-top:8px;padding:7px 10px;background:rgba(61,154,232,0.07);border-left:3px solid var(--blue);border-radius:0 7px 7px 0}
.msg-ai-label{font-size:10.5px;font-weight:600;color:var(--blue2);margin-bottom:4px}
.msg-ai-txt{font-size:12px;color:var(--t2);line-height:1.6}
.dots{display:flex;gap:3px;align-items:center}
.dots span{width:3px;height:3px;border-radius:50%;background:var(--blue);animation:blink 1.4s infinite;opacity:0.3}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

.msg-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.reactions{display:flex;gap:3px}
.react-btn{display:flex;align-items:center;gap:2px;padding:3px 8px;border-radius:12px;background:var(--s2);border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all .15s;color:var(--t2)}
.react-btn.active-like{background:rgba(61,154,232,0.15);border-color:var(--blue);color:var(--blue2)}
.react-btn.active-fire{background:rgba(255,140,66,0.15);border-color:var(--orange);color:var(--orange)}
.react-btn.active-heart{background:rgba(255,107,157,0.15);border-color:var(--pink);color:var(--pink)}
.react-count{font-size:11px;font-weight:600}
.msg-right{display:flex;align-items:center;gap:6px}
.link-btn{font-size:11px;color:var(--blue2);text-decoration:none;padding:3px 8px;border-radius:12px;border:1px solid rgba(61,154,232,0.25);transition:all .15s}
.link-btn:active{background:rgba(61,154,232,0.1)}
.btn-save{background:transparent;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
.btn-save svg{width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2;transition:all .15s}
.btn-save.saved svg{stroke:#f4c542;fill:#f4c542}

@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.pop{animation:pop .28s ease}

/* SECTIONS */
.section{padding:14px}
.section-title{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.add-row{display:flex;flex-direction:column;gap:8px}
.inp{width:100%;padding:10px 13px;background:var(--s2);border:1px solid var(--border2);border-radius:10px;font-size:14px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s}
.inp::placeholder{color:var(--t3)}
.inp:focus{border-color:var(--blue)}
.btn-add{width:100%;padding:11px;border-radius:10px;background:var(--blue);border:none;font-size:14px;font-weight:600;font-family:var(--sans);color:#fff;cursor:pointer}

.ch-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border)}
.ch-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:14px;font-weight:500}
.ch-sub{font-size:12px;color:var(--t3);margin-top:1px}
.ch-actions{display:flex;align-items:center;gap:8px}
.toggle{width:38px;height:21px;border-radius:11px;position:relative;border:none;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--blue)}.toggle.off{background:var(--s3)}
.knob{position:absolute;top:2.5px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on .knob{left:19px}.toggle.off .knob{left:2px}
.btn-del{width:28px;height:28px;border-radius:8px;background:transparent;border:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-del svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* PROFILE */
.profile-hero{background:var(--s1);padding:24px 16px 18px;display:flex;flex-direction:column;align-items:center;text-align:center;border-bottom:1px solid var(--border)}
.profile-big-av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#2b5278);display:flex;align-items:center;justify-content:center;font-size:34px;border:3px solid var(--blue);margin-bottom:10px;cursor:pointer;overflow:hidden;box-shadow:0 0 0 4px rgba(61,154,232,0.12)}
.profile-big-av img{width:100%;height:100%;object-fit:cover}
.profile-uname{font-size:18px;font-weight:700;margin-bottom:3px}
.profile-handle{font-size:12px;color:var(--blue2);font-weight:500}
.profile-stats{display:flex;margin-top:16px;background:var(--s2);border-radius:12px;overflow:hidden;width:100%;border:1px solid var(--border)}
.p-stat{flex:1;padding:12px 6px;text-align:center;border-right:1px solid var(--border)}
.p-stat:last-child{border-right:none}
.p-stat-n{font-size:18px;font-weight:700;color:var(--blue2)}
.p-stat-l{font-size:10px;color:var(--t3);margin-top:1px}

/* SETTINGS */
.set-section{border-bottom:1px solid var(--border);padding:14px}
.set-title{font-size:11px;font-weight:600;color:var(--blue2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.set-field{margin-bottom:11px}
.set-label{font-size:12.5px;color:var(--t2);margin-bottom:5px;display:block}
.set-inp{width:100%;padding:10px 13px;background:var(--s2);border:1px solid var(--border2);border-radius:10px;font-size:14px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s}
.set-inp:focus{border-color:var(--blue)}
select.set-inp{cursor:pointer}
.btn-save-set{width:100%;padding:11px;background:var(--blue);border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:var(--sans);color:#fff;cursor:pointer;margin-top:4px}
.saved-ok{margin-top:10px;padding:10px 13px;background:rgba(77,205,94,0.1);border-radius:10px;border:1px solid rgba(77,205,94,0.2);font-size:13px;color:var(--green);display:none;align-items:center;gap:7px}
.saved-ok svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none;padding-bottom:0}
.set-row-l{font-size:14px;font-weight:500}
.set-row-s{font-size:11.5px;color:var(--t3);margin-top:2px}

/* EMPTY / LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:12px}
.loader-spinner{width:28px;height:28px;border:3px solid var(--s3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--t3)}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-t{font-size:14px;font-weight:500;color:var(--t2);margin-bottom:5px}
.empty-s{font-size:12.5px}
.fav-empty{text-align:center;padding:50px 20px}
.fav-empty .big-emoji{font-size:40px;display:block;margin-bottom:12px}
.fav-empty p{font-size:14px;color:var(--t2);margin-bottom:5px;font-weight:500}
.fav-empty span{font-size:12.5px;color:var(--t3)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + 12px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--border2);border-radius:12px;padding:9px 16px;font-size:13px;color:var(--text);z-index:99;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

#avatar-input{display:none}
</style>
</head>
<body>
<input type="file" id="avatar-input" accept="image/*" onchange="changeAvatar(this)">

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-icon" id="topbar-icon">📰</div>
  <div class="topbar-info">
    <div class="topbar-title" id="topbar-title">Лента</div>
    <div class="topbar-sub" id="topbar-sub">все новости</div>
  </div>
  <button class="icon-btn" onclick="refresh()"><svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
</div>

<!-- PAGES -->
<div class="page active" id="page-feed">
  <div class="filter-bar" id="filter-bar"></div>
  <div class="msg-wrap" id="feed-list"></div>
</div>

<div class="page" id="page-fav">
  <div class="msg-wrap" id="fav-list"></div>
</div>

<div class="page" id="page-channels">
  <div class="section">
    <div class="section-title">Добавить канал</div>
    <div class="add-row">
      <input class="inp" id="cu" placeholder="@username канала">
      <input class="inp" id="cn" placeholder="Название">
      <input class="inp" id="ce" placeholder="Эмодзи (например 📢)">
      <button class="btn-add" onclick="addCh()">Добавить</button>
    </div>
  </div>
  <div id="ch-list"></div>
</div>

<div class="page" id="page-profile">
  <div class="profile-hero">
    <div class="profile-big-av" onclick="document.getElementById('avatar-input').click()">
      <span id="big-av-e">⚡</span>
      <img id="big-av-img" src="" style="display:none">
    </div>
    <div class="profile-uname" id="profile-uname">Мой кабинет</div>
    <div class="profile-handle">NewsFeed Pro</div>
    <div class="profile-stats">
      <div class="p-stat"><div class="p-stat-n" id="ps-ch">0</div><div class="p-stat-l">каналов</div></div>
      <div class="p-stat"><div class="p-stat-n" id="ps-fav">0</div><div class="p-stat-l">избранных</div></div>
      <div class="p-stat"><div class="p-stat-n" id="ps-s">0</div><div class="p-stat-l">отправлено</div></div>
    </div>
  </div>
  <div class="set-section">
    <div class="set-title">Имя кабинета</div>
    <div class="set-field"><input class="set-inp" id="prof-name" placeholder="Мой кабинет"></div>
    <button class="btn-save-set" onclick="savePro()">Сохранить</button>
  </div>
  <div class="set-section">
    <div class="set-title">API ключи</div>
    <div class="set-field"><label class="set-label">Claude API Key</label><input class="set-inp" id="sk" type="password" placeholder="sk-ant-..."></div>
    <div class="set-field"><label class="set-label">Telegram Bot Token</label><input class="set-inp" id="st" type="password" placeholder="123456:ABC..."></div>
    <button class="btn-save-set" onclick="saveS()">Сохранить</button>
    <div class="saved-ok" id="saved"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Сохранено!</div>
  </div>
  <div class="set-section">
    <div class="set-title">AI комментарии</div>
    <div class="set-row">
      <div><div class="set-row-l">Включить AI</div><div class="set-row-s">Claude анализирует новости</div></div>
      <button class="toggle on" id="tai" onclick="tog(this,'ai')"><div class="knob"></div></button>
    </div>
    <div style="padding:10px 0 6px"><div class="set-row-s">Стиль</div></div>
    <select class="set-inp" id="ais">
      <option value="neutral">Нейтральный аналитик</option>
      <option value="short">Коротко и по делу</option>
      <option value="critical">Критический взгляд</option>
      <option value="simple">Простыми словами</option>
    </select>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nb-feed" onclick="pg('feed',this)">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10"/></svg>
    <span>Лента</span>
  </button>
  <button class="nav-btn" id="nb-fav" onclick="pg('fav',this)">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Избранное</span>
    <div class="nav-badge" id="fav-badge" style="display:none">0</div>
  </button>
  <button class="nav-btn" id="nb-channels" onclick="pg('channels',this)">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <span>Каналы</span>
  </button>
  <button class="nav-btn" id="nb-profile" onclick="pg('profile',this)">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Профиль</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
(function(){
  if(window.Telegram&&window.Telegram.WebApp){
    const tg=window.Telegram.WebApp;
    tg.ready();tg.expand();
    tg.setHeaderColor('#0e1621');
    tg.setBackgroundColor('#0e1621');
    tg.MainButton.hide();
  }
})();

const CH_COLORS=['#3d9ae8','#4dcd5e','#ff8c42','#ff6b9d','#a78bfa','#34d399','#f59e0b','#60a5fa'];

let channels=JSON.parse(localStorage.getItem('nf_ch')||'null')||[
  {id:1,username:'ssternenko',name:'Стерненко',emoji:'🇺🇦',on:true,color:'#3d9ae8'},
  {id:2,username:'vach_govorit',name:'Вач говорит',emoji:'🎙',on:true,color:'#4dcd5e'},
  {id:3,username:'lachentyt',name:'Лаченко',emoji:'📢',on:true,color:'#ff8c42'},
  {id:4,username:'vanek_nikolaev',name:'Ваня Николаев',emoji:'👤',on:true,color:'#ff6b9d'},
  {id:5,username:'truexanewsua',name:'TrueXA News',emoji:'📰',on:true,color:'#a78bfa'},
];
let friends=JSON.parse(localStorage.getItem('nf_fr')||'[]');
let settings=JSON.parse(localStorage.getItem('nf_set')||'{}');
let profile=JSON.parse(localStorage.getItem('nf_pro')||'{"name":"Мой кабинет","emoji":"⚡"}');
let favorites=JSON.parse(localStorage.getItem('nf_fav')||'[]');
let aiOn=settings.ai!==false;
let sent=parseInt(localStorage.getItem('nf_sent')||'0');
let filt='all';
let news=[];
let userReacts={};

const styles={neutral:'Нейтральний аналітик. 2-3 речення.',short:'1-2 речення. Найголовніше.',critical:'Критичний погляд.',simple:'Поясни просто.'};

function changeAvatar(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{profile.avatar=e.target.result;localStorage.setItem('nf_pro',JSON.stringify(profile));applyAvatar();};
  r.readAsDataURL(file);
}
function applyAvatar(){
  const url=profile.avatar||'';
  const img=document.getElementById('big-av-img');
  const em=document.getElementById('big-av-e');
  if(img){img.src=url;img.style.display=url?'block':'none';}
  if(em)em.style.display=url?'none':'';
}

function pg(name,el){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const titles={feed:'Лента',fav:'Избранное',channels:'Каналы',profile:'Профиль'};
  const subs={feed:'все новости',fav:'сохранённые',channels:'управление',profile:'настройки'};
  const icons={feed:'📰',fav:'⭐',channels:'📡',profile:'👤'};
  document.getElementById('topbar-title').textContent=titles[name]||name;
  document.getElementById('topbar-sub').textContent=subs[name]||'';
  document.getElementById('topbar-icon').textContent=icons[name]||'📰';
  if(name==='channels')rCh();
  if(name==='profile'){rPro();lS();}
  if(name==='fav')rFav();
  uStats();
}

function uStats(){
  const c=channels.filter(x=>x.on).length;
  const fv=favorites.length;
  const fb=document.getElementById('fav-badge');
  if(fb){fb.textContent=fv;fb.style.display=fv>0?'flex':'none';}
  const psc=document.getElementById('ps-ch');if(psc)psc.textContent=c;
  const psf=document.getElementById('ps-fav');if(psf)psf.textContent=fv;
  const pss=document.getElementById('ps-s');if(pss)pss.textContent=sent;
}

function getChColor(username){
  const ch=channels.find(c=>c.username===username);
  return ch&&ch.color?ch.color:CH_COLORS[0];
}

function bChips(){
  const r=document.getElementById('filter-bar');r.innerHTML='';
  const a=mk('button','chip'+(filt==='all'?' on':''));
  a.textContent='Все';a.onclick=()=>{filt='all';bChips();rFeed()};r.appendChild(a);
  channels.filter(c=>c.on).forEach(ch=>{
    const b=mk('button','chip'+(filt===ch.username?' on':''));
    b.textContent=ch.emoji+' '+ch.name;
    if(filt===ch.username)b.style.background=ch.color||'var(--blue)';
    b.onclick=()=>{filt=ch.username;bChips();rFeed()};
    r.appendChild(b);
  });
}

function buildCard(item){
  const isSaved=favorites.some(f=>f.id===item.id);
  const ur=userReacts[item.id]||{};
  const reactions=item.reactions||{like:0,fire:0,heart:0};
  const chColor=getChColor(item.ch);
  let mediaHtml='';
  if(item.media&&item.media.type==='photo'){
    mediaHtml=`<div class="msg-media"><img src="${item.media.url}" loading="lazy" alt="" onerror="this.parentElement.style.display='none'"></div>`;
  }
  const aiSection=item.ai
    ?`<div class="msg-ai"><div class="msg-ai-label">🤖 AI комментарий</div><div class="msg-ai-txt">${item.ai}</div></div>`
    :(aiOn&&settings.claudeKey?`<div class="msg-ai" id="ai${item.id}"><div class="msg-ai-label">AI анализирует...</div><div class="dots"><span></span><span></span><span></span></div></div>`:'');
  return`<div class="msg-bubble" style="--ch-color:${chColor}">
    <div class="msg-header">
      <div class="ch-avatar" style="background:${chColor}22">${item.emoji}</div>
      <div class="msg-channel" style="color:${chColor}">@${item.ch}</div>
      <span class="msg-time-top">${item.time}</span>
    </div>
    <div class="msg-title">${item.title}</div>
    ${mediaHtml}
    <div class="msg-body${item.exp?' exp':''}" id="b${item.id}">${item.body}</div>
    <button class="expand-btn" onclick="exp('${item.id}')">${item.exp?'Свернуть ▲':'Читать полностью ▼'}</button>
    ${aiSection}
    <div class="msg-foot">
      <div class="reactions">
        <button class="react-btn${ur.like?' active-like':''}" id="rb-like-${item.id}" onclick="react('${item.id}','like')">👍 <span class="react-count" id="rc-like-${item.id}">${reactions.like}</span></button>
        <button class="react-btn${ur.fire?' active-fire':''}" id="rb-fire-${item.id}" onclick="react('${item.id}','fire')">🔥 <span class="react-count" id="rc-fire-${item.id}">${reactions.fire}</span></button>
        <button class="react-btn${ur.heart?' active-heart':''}" id="rb-heart-${item.id}" onclick="react('${item.id}','heart')">❤️ <span class="react-count" id="rc-heart-${item.id}">${reactions.heart}</span></button>
      </div>
      <div class="msg-right">
        ${item.link?`<a class="link-btn" href="${item.link}" target="_blank">Открыть</a>`:''}
        <button class="btn-save${isSaved?' saved':''}" id="bs-${item.id}" onclick="toggleFav('${item.id}')">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}

function rFeed(){
  const list=document.getElementById('feed-list');list.innerHTML='';
  const active=channels.filter(c=>c.on).map(c=>c.username);
  let items=news.filter(n=>active.includes(n.ch));
  if(filt!=='all')items=items.filter(n=>n.ch===filt);
  if(!items.length){list.innerHTML=`<div class="empty"><div class="empty-t">Нет новостей</div><div class="empty-s">Включи каналы во вкладке «Каналы»</div></div>`;return;}
  const d=mk('div','msg-date');
  d.innerHTML=`<span>${new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</span>`;
  list.appendChild(d);
  items.forEach(item=>{
    const w=mk('div','news-msg');w.innerHTML=buildCard(item);list.appendChild(w);
    if(!item.ai&&aiOn&&settings.claudeKey)fAI(item);
  });
}

function rFav(){
  const list=document.getElementById('fav-list');list.innerHTML='';
  if(!favorites.length){list.innerHTML=`<div class="fav-empty"><span class="big-emoji">⭐</span><p>Избранное пусто</p><span>Нажми ★ на любой новости</span></div>`;return;}
  favorites.forEach(item=>{const w=mk('div','news-msg');w.innerHTML=buildCard(item);list.appendChild(w);});
}

function toggleFav(id){
  const item=news.find(n=>n.id===id)||favorites.find(n=>n.id===id);if(!item)return;
  const idx=favorites.findIndex(f=>f.id===id);
  if(idx>=0){favorites.splice(idx,1);showT('Убрано из избранного');}
  else{favorites.push({...item});showT('Добавлено ⭐');}
  localStorage.setItem('nf_fav',JSON.stringify(favorites));
  document.querySelectorAll('#bs-'+id).forEach(btn=>btn.classList.toggle('saved',favorites.some(f=>f.id===id)));
  uStats();
}

function react(id,type){
  if(!userReacts[id])userReacts[id]={};
  const item=news.find(n=>n.id===id)||favorites.find(n=>n.id===id);
  if(!item||!item.reactions)return;
  const btn=document.getElementById('rb-'+type+'-'+id);
  const cnt=document.getElementById('rc-'+type+'-'+id);
  if(!btn||!cnt)return;
  if(userReacts[id][type]){userReacts[id][type]=false;item.reactions[type]--;btn.classList.remove('active-'+type);}
  else{userReacts[id][type]=true;item.reactions[type]++;btn.classList.add('active-'+type);btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),300);}
  cnt.textContent=item.reactions[type];
}

function exp(id){
  const item=news.find(n=>n.id===id)||favorites.find(n=>n.id===id);if(!item)return;
  item.exp=!item.exp;
  document.querySelectorAll('#b'+id).forEach(el=>el.classList.toggle('exp',item.exp));
  document.querySelectorAll('.expand-btn').forEach(btn=>{
    if(btn.closest('.msg-bubble')&&btn.closest('.msg-bubble').querySelector('#b'+id))
      btn.textContent=item.exp?'Свернуть ▲':'Читать полностью ▼';
  });
}

async function fAI(item){
  try{
    const style=styles[settings.aiStyle||'neutral'];
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:150,system:style,messages:[{role:'user',content:`@${item.ch}: ${item.title}\n${item.body}\nКомментарій.`}]})});
    const d=await r.json();const txt=d.content?.[0]?.text;
    if(txt){item.ai=txt;document.querySelectorAll('#ai'+item.id).forEach(el=>{el.innerHTML=`<div class="msg-ai-label">🤖 AI комментарий</div><div class="msg-ai-txt">${txt}</div>`;});}
  }catch(e){}
}

function rCh(){
  const l=document.getElementById('ch-list');l.innerHTML='';
  if(!channels.length){l.innerHTML=`<div class="empty"><div class="empty-t">Нет каналов</div></div>`;return;}
  channels.forEach((ch,i)=>{
    const el=mk('div','ch-item');
    el.innerHTML=`<div class="ch-av" style="background:${ch.color||'#3d9ae8'}22">${ch.emoji}</div><div class="ch-info"><div class="ch-name">${ch.name}</div><div class="ch-sub">@${ch.username}</div></div><div class="ch-actions"><button class="toggle ${ch.on?'on':'off'}" onclick="tCh(${i},this)"><div class="knob"></div></button><button class="btn-del" onclick="dCh(${i})"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div>`;
    l.appendChild(el);
  });
}
function addCh(){
  const u=document.getElementById('cu').value.trim().replace('@','').toLowerCase();
  const n=document.getElementById('cn').value.trim();
  const e=document.getElementById('ce').value.trim()||'📢';
  if(!u){showT('Введи username канала');return;}
  if(channels.find(c=>c.username===u)){showT('Уже добавлен');return;}
  channels.push({id:Date.now(),username:u,name:n||'@'+u,emoji:e,on:true,color:CH_COLORS[channels.length%CH_COLORS.length]});
  sCh();rCh();bChips();uStats();
  ['cu','cn','ce'].forEach(id=>document.getElementById(id).value='');
  showT('Канал добавлен ✓');
}
function tCh(i,btn){channels[i].on=!channels[i].on;btn.className='toggle '+(channels[i].on?'on':'off');sCh();bChips();uStats();}
function dCh(i){if(!confirm('Удалить?'))return;channels.splice(i,1);sCh();rCh();bChips();uStats();}
function sCh(){localStorage.setItem('nf_ch',JSON.stringify(channels));}

function lS(){
  document.getElementById('sk').value=settings.claudeKey||'';
  document.getElementById('st').value=settings.tgToken||'';
  document.getElementById('ais').value=settings.aiStyle||'neutral';
  document.getElementById('tai').className='toggle '+(aiOn?'on':'off');
}
function saveS(){
  settings.claudeKey=document.getElementById('sk').value.trim();
  settings.tgToken=document.getElementById('st').value.trim();
  settings.aiStyle=document.getElementById('ais').value;
  settings.ai=aiOn;
  localStorage.setItem('nf_set',JSON.stringify(settings));
  const el=document.getElementById('saved');el.style.display='flex';setTimeout(()=>el.style.display='none',2500);
}
function tog(btn,key){const on=btn.classList.toggle('on');btn.classList.toggle('off',!on);if(key==='ai')aiOn=on;}

function rPro(){document.getElementById('prof-name').value=profile.name||'Мой кабинет';uStats();}
function savePro(){
  profile.name=document.getElementById('prof-name').value.trim()||'Мой кабинет';
  localStorage.setItem('nf_pro',JSON.stringify(profile));
  document.getElementById('profile-uname').textContent=profile.name;
  showT('Профиль сохранён ✓');
}

function mk(t,c){const el=document.createElement(t);el.className=c;return el;}
function showT(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

if(profile.avatar)applyAvatar();
document.getElementById('profile-uname').textContent=profile.name||'Мой кабинет';
bChips();uStats();

async function loadFeed(){
  const list=document.getElementById('feed-list');
  list.innerHTML=`<div class="loader"><div class="loader-spinner"></div><div class="loader-text">Загружаю новости...</div></div>`;
  try{
    const r=await fetch('https://newsfeed-production-9b3b.up.railway.app/news');
    const d=await r.json();
    news=d.news.map(item=>({
      id:item.id,ch:item.ch,name:item.name||item.ch,emoji:item.emoji||'📰',
      title:item.title||item.body.slice(0,80),body:item.body,
      time:item.time?new Date(item.time).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}):'',
      ai:null,exp:false,
      media:item.img?{type:'photo',url:item.img}:null,
      link:item.link,
      reactions:{like:Math.floor(Math.random()*80),fire:Math.floor(Math.random()*50),heart:Math.floor(Math.random()*60)}
    }));
    rFeed();showT('Загружено '+news.length+' новостей ✓');
  }catch(e){
    list.innerHTML=`<div class="empty"><div class="empty-t">Ошибка загрузки</div><div class="empty-s">Проверь подключение</div></div>`;
  }
}
function refresh(){loadFeed();}
loadFeed();
setInterval(loadFeed,30000);
</script>
</body>
</html>
